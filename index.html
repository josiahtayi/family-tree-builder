<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree Builder</title>
<style>
:root {
  --bg:#f0f2f5; --surface:#fff; --surface2:#f8f9fa; --border:#e0e0e0;
  --text:#333; --muted:#888; --strong:#111; --primary:#0066cc;
  --primary-h:#0052a3; --primary-l:#e8f0fe; --danger:#d93025;
  --input-bg:#fafafa; --shadow:0 1px 4px rgba(0,0,0,.08);
}
[data-theme="dark"] {
  --bg:#121212; --surface:#1e1e1e; --surface2:#252525; --border:#333;
  --text:#ccc; --muted:#666; --strong:#eee; --primary:#4d9fff;
  --primary-h:#3d8fef; --primary-l:#1a2540; --danger:#ff6b6b;
  --input-bg:#1a1a1a; --shadow:0 1px 4px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── Toolbar ── */
.tb{display:flex;align-items:center;gap:5px;padding:7px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.tb-title{font-size:14px;font-weight:700;color:var(--strong);white-space:nowrap;margin-right:2px}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 3px;flex-shrink:0}
.sw{position:relative}
.sw input{padding:5px 8px 5px 24px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--input-bg);color:var(--text);width:150px;font-family:inherit}
.sw::before{content:"⌕";position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none}
.tree-sel{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--input-bg);color:var(--text);font-family:inherit}
/* .m = mobile-only; hidden on desktop */
.m{display:none!important}

/* ── Mobile search bar (hidden until toggled) ── */
.mobile-search{display:none;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.mobile-search.open{display:flex}
.mobile-search input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:16px;background:var(--input-bg);color:var(--text);font-family:inherit}
.mobile-search input:focus{outline:none;border-color:var(--primary)}
.mobile-search button{padding:6px 10px;font-size:14px;color:var(--muted)}

/* ── Layout ── */
.main{display:flex;flex:1;gap:10px;padding:10px;overflow:hidden;min-height:0}
.sidebar{width:330px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow-y:auto;box-shadow:var(--shadow)}
.si{padding:12px}
.canvas-area{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:auto;box-shadow:var(--shadow)}
.ca-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.ca-head h2{font-size:13px;font-weight:600;color:var(--strong)}
.ca-body{padding:14px}

/* ── Buttons ── */
button{display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border:1px solid var(--border);background:var(--surface);border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;transition:background .1s,border-color .1s;font-family:inherit}
button:hover{background:var(--surface2);border-color:var(--muted)}
button.primary{background:var(--primary);color:#fff;border-color:transparent}
button.primary:hover{background:var(--primary-h)}
button.danger{color:var(--danger);border-color:var(--danger)}
button.danger:hover{background:rgba(217,48,37,.08)}
button:disabled{opacity:.38;pointer-events:none}
.hidden{display:none!important}

/* ── Form ── */
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg{margin-bottom:8px}
.fg label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:2px}
input[type=text],input[type=number],select,textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--input-bg);color:var(--text);font-family:inherit}
textarea{resize:vertical;min-height:50px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}

/* ── Section heads ── */
.sh{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:12px 0 5px}
.divider{border-top:1px solid var(--border);margin:10px 0}

/* ── Photo ── */
.pb{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px;text-align:center;margin-bottom:9px}
.pb img.prev{width:100%;height:100px;object-fit:cover;border-radius:5px;margin-bottom:6px;display:block}
.pb input[type=file]{display:none}
.phlbl{display:inline-block;padding:5px 10px;background:var(--primary);color:#fff;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer}
.phlbl:hover{background:var(--primary-h)}

/* ── Person list ── */
.pi{display:flex;align-items:center;gap:8px;padding:7px 8px;margin-bottom:4px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:background .1s,border-color .1s}
.pi:hover{background:var(--surface);border-color:var(--muted)}
.pi.sel{border-color:var(--primary);background:var(--primary-l)}
.av{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;object-fit:cover}
.pn{font-size:13px;font-weight:500;color:var(--strong)}
.ps{font-size:11px;color:var(--muted)}
.br{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:28px 10px}

/* ── Detail modal ── */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.mbg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:370px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25);position:relative}
.mc{position:absolute;top:9px;right:11px;background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:2px 6px}
.mav{width:68px;height:68px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 11px;object-fit:cover}
.mn{font-size:19px;font-weight:700;text-align:center;color:var(--strong)}
.mg{font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px}
.mf{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.mfi{background:var(--surface2);border-radius:7px;padding:8px 10px}
.mfl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:2px}
.mfv{font-size:14px;font-weight:600;color:var(--strong)}
.mnotes{background:var(--surface2);border-radius:7px;padding:9px;font-size:12px;color:var(--text);margin-bottom:11px;font-style:italic}
.mrels{font-size:12px}
.mrel{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.mrel:last-child{border-bottom:none}
.mrel-l{color:var(--muted)}
.mrel-r{font-weight:500;color:var(--strong);text-align:right;max-width:200px}

/* ── Bottom tab bar (mobile only, hidden on desktop) ── */
.tab-bar{display:none}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;border:none;border-radius:0;background:transparent;color:var(--muted);font-size:11px;font-weight:500;gap:3px;min-height:52px;cursor:pointer}
.tab-btn:hover{background:var(--surface2)}
.tab-btn .ti{font-size:20px;line-height:1}
.tab-btn.active{color:var(--primary)}

/* ── More menu (mobile bottom sheet) ── */
.more-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end}
.more-bg.open{display:flex}
.more-sheet{background:var(--surface);border-radius:16px 16px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));width:100%;max-height:85vh;overflow-y:auto}
.more-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.more-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.more-row{display:flex;gap:8px;margin-bottom:8px}
.more-row button{flex:1;justify-content:center;padding:10px 8px;font-size:13px}
.more-sep{border-top:1px solid var(--border);margin:12px 0}
.more-sel{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--input-bg);color:var(--text);font-family:inherit;margin-bottom:8px}

/* ── Print ── */
@media print{
  .tb,.sidebar,.ca-head,.tab-bar,.more-bg,.mobile-search{display:none!important}
  body{height:auto;overflow:visible}
  .main{display:block;padding:0;height:auto;overflow:visible}
  .canvas-area{border:none;box-shadow:none;border-radius:0}
  .ca-body{padding:0;overflow:visible}
  #treeContainer svg{width:100%!important;height:auto!important}
}

/* ── Mobile responsive ── */
@media (max-width:640px){
  /* Prevent iOS input zoom */
  input[type=text],input[type=number],select,textarea{font-size:16px!important}

  /* Compact toolbar: hide desktop items, show mobile items */
  .d{display:none!important}
  .m{display:inline-flex!important}
  .tb{padding:8px 12px}
  .tb-title{flex:1}

  /* Stack layout into tabs */
  .main{flex-direction:column;padding:0;gap:0;padding-bottom:0}
  .sidebar{
    width:100%;border-radius:0;border-left:none;border-right:none;border-top:none;
    display:none;flex:1;min-height:0;overflow-y:auto;
  }
  .sidebar.tab-active{display:flex;flex-direction:column}
  .canvas-area{
    border-radius:0;border-left:none;border-right:none;border-top:none;
    display:none;flex:1;overflow:auto;
  }
  .canvas-area.tab-active{display:block;flex:1}
  .ca-body{padding:10px;min-height:0}
  .si{padding-bottom:70px}

  /* Bottom tab bar */
  .tab-bar{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--surface);border-top:1px solid var(--border);
    z-index:50;padding-bottom:env(safe-area-inset-bottom);
  }

  /* FAB add button */
  .fab{
    position:fixed;bottom:calc(60px + env(safe-area-inset-bottom) + 14px);right:16px;
    width:50px;height:50px;border-radius:50%;background:var(--primary);color:#fff;
    font-size:24px;border:none;box-shadow:0 4px 14px rgba(0,0,0,.25);
    display:flex;align-items:center;justify-content:center;z-index:49;cursor:pointer;
  }
  .fab:hover{background:var(--primary-h)}

  /* .m.hidden beats .m{display:inline-flex!important} via higher specificity */
  .m.hidden{display:none!important}

  /* Bigger touch targets in list */
  .pi{padding:10px 10px;min-height:52px}
  .br button{min-height:40px;flex:1}

  /* Modal fills screen on mobile */
  .modal{width:100%;max-width:100%;border-radius:16px 16px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:92vh;padding:20px 16px calc(20px + env(safe-area-inset-bottom))}
  .mbg{align-items:flex-end}
}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="tb">
  <span class="tb-title">👨‍👩‍👧‍👦 Family Tree</span>

  <!-- Desktop-only items (.d hidden on mobile) -->
  <div class="tb-sep d"></div>
  <select id="treeSel" class="tree-sel d" onchange="switchTree(this.value)"></select>
  <button class="d" onclick="newTree()">+ New</button>
  <button class="d" onclick="renameTree()">Rename</button>
  <div class="tb-sep d"></div>
  <button id="undoBtn" class="d" onclick="undo()" disabled>↩ Undo</button>
  <button id="redoBtn" class="d" onclick="redo()" disabled>↪ Redo</button>
  <div class="tb-sep d"></div>
  <div class="sw d"><input type="text" id="searchInp" placeholder="Search…" oninput="onSearch(this.value)"></div>
  <div class="tb-sep d"></div>
  <button class="d" onclick="exportJSON()">⬇ JSON</button>
  <button class="d" onclick="document.getElementById('importInp').click()">⬆ Import</button>
  <input type="file" id="importInp" accept=".json" style="display:none" onchange="importJSON(event)">
  <div class="tb-sep d"></div>
  <button id="pngBtn" onclick="dlPNG()" class="hidden d">PNG</button>
  <button id="svgBtn" onclick="dlSVG()" class="hidden d">SVG</button>
  <button class="d" onclick="window.print()">🖨</button>

  <!-- Always visible -->
  <button id="darkBtn" onclick="toggleDark()">🌙</button>

  <!-- Mobile-only items (.m hidden on desktop) -->
  <button class="m" id="searchToggleBtn" onclick="toggleMobileSearch()" title="Search">🔍</button>
  <button class="m" onclick="openMoreMenu()" title="More">⋯</button>
</div>

<!-- Mobile search bar (hidden until toggled) -->
<div class="mobile-search" id="mobileSearch">
  <input type="search" id="mobileSearchInp" placeholder="Search members…" oninput="onSearch(this.value)" autocomplete="off">
  <button onclick="closeMobileSearch()">✕</button>
</div>

<!-- Main layout -->
<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="si">
      <button class="primary" style="width:100%;margin-bottom:10px" onclick="addPerson()">+ Add Member</button>

      <div id="editor" style="display:none">
        <div class="sh">Edit Member</div>
        <div class="pb">
          <img id="ephoto" class="prev" style="display:none">
          <label class="phlbl" for="photoInp">📸 Upload Photo</label>
          <input type="file" id="photoInp" accept="image/*" onchange="uploadPhoto(event)">
          <button class="danger" id="rmPhotoBtn" style="margin-top:6px;width:100%;display:none" onclick="removePhoto()">Remove Photo</button>
        </div>
        <div class="fg"><label>Full Name</label><input type="text" id="eName" placeholder="e.g., John Smith" autocomplete="name"></div>
        <div class="fr">
          <div class="fg"><label>Birth Year</label><input type="number" id="eBirth" placeholder="1950"></div>
          <div class="fg"><label>Death Year</label><input type="number" id="eDeath" placeholder="—"></div>
        </div>
        <div class="fg"><label>Generation</label>
          <select id="eGen">
            <option value="Great-Grandparent">Great-Grandparent</option>
            <option value="Grandparent">Grandparent</option>
            <option value="Parent">Parent</option>
            <option value="Child">Child</option>
            <option value="Grandchild">Grandchild</option>
          </select>
        </div>
        <div class="fg"><label>Parent</label><select id="eParent"><option value="">None</option></select></div>
        <div class="fg"><label>Spouse / Partner</label><select id="eSpouse"><option value="">None</option></select></div>
        <div class="fg"><label>Notes</label><textarea id="eNotes" placeholder="Anything noteworthy…"></textarea></div>
        <div class="br">
          <button class="primary" onclick="savePerson()" style="flex:1">Save</button>
          <button onclick="viewDetail(selectedId)" title="View details">👁</button>
          <button class="danger" onclick="deletePerson()">Delete</button>
        </div>
        <div class="divider"></div>
      </div>

      <div class="sh">Family Members</div>
      <div id="membersList"></div>
      <div id="emptyMsg" class="empty" style="display:none">No members yet — add one to get started.</div>
    </div>
  </div>

  <div class="canvas-area" id="canvasArea">
    <div class="ca-head">
      <h2>Family Tree Preview</h2>
      <div style="display:flex;gap:6px">
        <button id="pngBtn2" onclick="dlPNG()" class="hidden">PNG</button>
        <button id="svgBtn2" onclick="dlSVG()" class="hidden">SVG</button>
      </div>
    </div>
    <div class="ca-body">
      <div id="treeContainer"></div>
    </div>
  </div>
</div>

<!-- FAB (mobile add button, shown over tree view) -->
<button class="fab m" id="fabBtn" onclick="addPerson();switchTab('people')" title="Add member">+</button>

<!-- Bottom tab bar (mobile only) -->
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" id="tabTree" onclick="switchTab('tree')">
    <span class="ti">🌳</span><span>Tree</span>
  </button>
  <button class="tab-btn" id="tabPeople" onclick="switchTab('people')">
    <span class="ti">👥</span><span>People</span>
  </button>
</div>

<!-- More menu bottom sheet (mobile) -->
<div class="more-bg" id="moreBg" onclick="closeMoreMenuBg(event)">
  <div class="more-sheet">
    <div class="more-handle"></div>

    <div class="more-lbl">Tree</div>
    <select id="mTreeSel" class="more-sel" onchange="switchTree(this.value);closeMoreMenu()"></select>
    <div class="more-row">
      <button onclick="newTree();closeMoreMenu()">+ New Tree</button>
      <button onclick="renameTree();closeMoreMenu()">Rename</button>
    </div>

    <div class="more-sep"></div>
    <div class="more-lbl">History</div>
    <div class="more-row">
      <button id="mUndoBtn" onclick="undo()" disabled>↩ Undo</button>
      <button id="mRedoBtn" onclick="redo()" disabled>↪ Redo</button>
    </div>

    <div class="more-sep"></div>
    <div class="more-lbl">Data</div>
    <div class="more-row">
      <button onclick="exportJSON();closeMoreMenu()">⬇ Export JSON</button>
      <button onclick="document.getElementById('importInp').click();closeMoreMenu()">⬆ Import</button>
    </div>

    <div class="more-sep"></div>
    <div class="more-lbl">Export Tree</div>
    <div class="more-row">
      <button onclick="dlPNG();closeMoreMenu()">PNG</button>
      <button onclick="dlSVG();closeMoreMenu()">SVG</button>
      <button onclick="window.print()">🖨 Print</button>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="mbg" id="detailBg" onclick="bgClick(event)">
  <div class="modal" id="detailModal">
    <button class="mc" onclick="closeDetail()">×</button>
    <div id="detailBody"></div>
  </div>
</div>

<script>
'use strict';

const GEN_ORDER = ['Great-Grandparent','Grandparent','Parent','Child','Grandchild'];
const GEN_COLOR = {
  'Great-Grandparent':'#7c3aed','Grandparent':'#2563eb',
  'Parent':'#059669','Child':'#d97706','Grandchild':'#dc2626'
};
const NW=140, NH=72, HG=24, VG=84;

// ── Storage ───────────────────────────────────────────────────────────────────
function defaultMembers() {
  return [
    {id:1,name:'Robert',  birth:1945,death:null,generation:'Grandparent',parentId:null,spouseId:2,notes:'',photo:null},
    {id:2,name:'Margaret',birth:1947,death:null,generation:'Grandparent',parentId:null,spouseId:1,notes:'',photo:null},
    {id:3,name:'James',   birth:1970,death:null,generation:'Parent',     parentId:1,   spouseId:4,notes:'',photo:null},
    {id:4,name:'Susan',   birth:1972,death:null,generation:'Parent',     parentId:null,spouseId:3,notes:'',photo:null},
    {id:5,name:'David',   birth:1995,death:null,generation:'Child',      parentId:3,   spouseId:null,notes:'',photo:null},
    {id:6,name:'Emma',    birth:1997,death:null,generation:'Child',      parentId:3,   spouseId:null,notes:'',photo:null},
  ];
}

function migrate(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.map(m => ({
    id:m.id, name:m.name??'Unknown', birth:m.birth??null, death:m.death??null,
    generation:m.generation??'Child', parentId:m.parentId??m.parent??null,
    spouseId:m.spouseId??null, notes:m.notes??'', photo:m.photo??null,
  }));
}

function loadApp() {
  try {
    const raw = JSON.parse(localStorage.getItem('ftApp'));
    if (raw?.trees) { raw.trees.forEach(t => { t.members = migrate(t.members); }); return raw; }
  } catch(_) {}
  try {
    const old = JSON.parse(localStorage.getItem('familyTree'));
    if (old) return {activeId:1, trees:[{id:1,name:'My Family',members:migrate(old)}]};
  } catch(_) {}
  return {activeId:1, trees:[{id:1,name:'My Family',members:defaultMembers()}]};
}

function persist() { localStorage.setItem('ftApp', JSON.stringify(app)); }

// ── State ─────────────────────────────────────────────────────────────────────
let app = loadApp();
let selectedId = null;
let query = '';
let hist = [], histIdx = -1;
let activeTab = 'tree';

function fam() { return app.trees.find(t => t.id === app.activeId)?.members ?? []; }
function setFam(m) { const t = app.trees.find(t => t.id === app.activeId); if(t) t.members = m; }
function nextId() { const f = fam(); return f.length ? Math.max(...f.map(p=>p.id))+1 : 1; }
function isMobile() { return window.innerWidth <= 640; }

// ── Undo / Redo ───────────────────────────────────────────────────────────────
function pushHist() {
  hist = hist.slice(0, histIdx+1);
  hist.push(JSON.stringify(fam()));
  histIdx = hist.length-1;
  syncHistBtns();
}
function undo() {
  if (histIdx <= 0) return;
  histIdx--;
  setFam(JSON.parse(hist[histIdx]));
  persist(); renderAll(); syncHistBtns();
}
function redo() {
  if (histIdx >= hist.length-1) return;
  histIdx++;
  setFam(JSON.parse(hist[histIdx]));
  persist(); renderAll(); syncHistBtns();
}
function syncHistBtns() {
  document.getElementById('undoBtn').disabled = histIdx <= 0;
  document.getElementById('redoBtn').disabled = histIdx >= hist.length-1;
  const mu = document.getElementById('mUndoBtn');
  const mr = document.getElementById('mRedoBtn');
  if (mu) mu.disabled = histIdx <= 0;
  if (mr) mr.disabled = histIdx >= hist.length-1;
}

// ── Multiple Trees ────────────────────────────────────────────────────────────
function renderTreeSel() {
  const opts = app.trees.map(t =>
    `<option value="${t.id}"${t.id===app.activeId?' selected':''}>${t.name}</option>`).join('');
  document.getElementById('treeSel').innerHTML = opts;
  const ms = document.getElementById('mTreeSel');
  if (ms) ms.innerHTML = opts;
}
function switchTree(id) {
  app.activeId = +id; selectedId = null;
  hist = [JSON.stringify(fam())]; histIdx = 0;
  persist(); renderAll(); syncHistBtns();
}
function newTree() {
  const name = prompt('Tree name:','New Family'); if (!name) return;
  const id = Math.max(...app.trees.map(t=>t.id))+1;
  app.trees.push({id, name, members:[]});
  app.activeId = id; selectedId = null;
  hist = [JSON.stringify([])]; histIdx = 0;
  persist(); renderTreeSel(); renderAll(); syncHistBtns();
}
function renameTree() {
  const t = app.trees.find(t=>t.id===app.activeId); if(!t) return;
  const name = prompt('Rename:',t.name); if (!name) return;
  t.name = name; persist(); renderTreeSel();
}

  if (tab === 'tree') {

// ── Export / Import ───────────────────────────────────────────────────────────
function exportJSON() {
  const t = app.trees.find(t=>t.id===app.activeId);
  const blob = new Blob([JSON.stringify(t,null,2)],{type:'application/json'});
  dlFile(URL.createObjectURL(blob),(t.name||'family').toLowerCase().replace(/\s+/g,'-')+'.json');
}
function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const members = migrate(Array.isArray(data) ? data : (data.members??[]));
      const name = data.name ?? file.name.replace(/\.json$/,'');
      if (!confirm(`Import "${name}" with ${members.length} members? Replaces current tree.`)) return;
      pushHist();
      const t = app.trees.find(t=>t.id===app.activeId);
      if (t) { t.name = name; t.members = members; }
      selectedId = null;
      persist(); renderTreeSel(); renderAll();
    } catch(err) { alert('Import failed: '+err.message); }
    e.target.value = '';
  };
  r.readAsText(file);
}

// ── Person CRUD ───────────────────────────────────────────────────────────────
function addPerson() {
  pushHist();
  const f = fam(), id = nextId();
  f.push({id,name:'New Person',birth:new Date().getFullYear(),death:null,
    generation:'Child',parentId:null,spouseId:null,notes:'',photo:null});
  setFam(f); selectedId = id; persist(); renderAll();
  setTimeout(() => { const el = document.getElementById('eName'); if(el) el.select(); }, 80);
}

function selectPerson(id) {
  selectedId = id;
  populateEditor();
  renderAll();
  if (isMobile()) switchTab('people');
}

function populateEditor() {
  const f = fam(), p = f.find(x=>x.id===selectedId);
  const ed = document.getElementById('editor');
  if (!p) { ed.style.display='none'; return; }
  ed.style.display = 'block';
  document.getElementById('eName').value  = p.name;
  document.getElementById('eBirth').value = p.birth??'';
  document.getElementById('eDeath').value = p.death??'';
  document.getElementById('eGen').value   = p.generation;
  document.getElementById('eNotes').value = p.notes;
  const ep = document.getElementById('ephoto'), rb = document.getElementById('rmPhotoBtn');
  if (p.photo) { ep.src=p.photo; ep.style.display='block'; rb.style.display='block'; }
  else { ep.style.display='none'; rb.style.display='none'; }
  const ps = document.getElementById('eParent'), ss = document.getElementById('eSpouse');
  ps.innerHTML = '<option value="">None</option>';
  ss.innerHTML = '<option value="">None</option>';
  f.forEach(q => {
    if (q.id === selectedId) return;
    ps.innerHTML += `<option value="${q.id}"${q.id===p.parentId?' selected':''}>${esc(q.name)}</option>`;
    ss.innerHTML += `<option value="${q.id}"${q.id===p.spouseId?' selected':''}>${esc(q.name)}</option>`;
  });
}

function savePerson() {
  pushHist();
  const f = fam(), p = f.find(x=>x.id===selectedId); if (!p) return;
  p.name       = document.getElementById('eName').value || 'Unknown';
  p.birth      = parseInt(document.getElementById('eBirth').value)||null;
  p.death      = parseInt(document.getElementById('eDeath').value)||null;
  p.generation = document.getElementById('eGen').value;
  p.parentId   = document.getElementById('eParent').value ? +document.getElementById('eParent').value : null;
  p.notes      = document.getElementById('eNotes').value;
  const newSid = document.getElementById('eSpouse').value ? +document.getElementById('eSpouse').value : null;
  if (p.spouseId && p.spouseId !== newSid) {
    const old = f.find(q=>q.id===p.spouseId);
    if (old && old.spouseId===p.id) old.spouseId = null;
  }
  p.spouseId = newSid;
  if (newSid) {
    const ns = f.find(q=>q.id===newSid);
    if (ns) {
      if (ns.spouseId && ns.spouseId !== p.id) {
        const prev = f.find(q=>q.id===ns.spouseId);
        if (prev && prev.spouseId===ns.id) prev.spouseId = null;
      }
      ns.spouseId = p.id;
    }
  }
  setFam(f); persist(); renderAll();
}

function deletePerson() {
  if (!confirm('Delete this person?')) return;
  pushHist();
  let f = fam();
  f.forEach(q => { if (q.spouseId===selectedId) q.spouseId=null; });
  f.forEach(q => { if (q.parentId===selectedId) q.parentId=null; });
  f = f.filter(q=>q.id!==selectedId);
  selectedId = null; setFam(f); persist(); renderAll();
}

function uploadPhoto(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    const f = fam(), p = f.find(x=>x.id===selectedId);
    if (p) { p.photo=ev.target.result; setFam(f); persist(); renderAll(); }
  };
  r.readAsDataURL(file);
}

function removePhoto() {
  const f = fam(), p = f.find(x=>x.id===selectedId);
  if (p) { p.photo=null; setFam(f); persist(); renderAll(); }
}

// ── Tree Layout ───────────────────────────────────────────────────────────────
function computeLayout(members) {
  if (!members.length) return {};
  const idSet = new Set(members.map(p=>p.id));
  const kids = {};
  members.forEach(p => { kids[p.id] = []; });
  members.forEach(p => { if (p.parentId && idSet.has(p.parentId)) kids[p.parentId].push(p.id); });

  const pos = {};
  members.forEach(p => {
    const gi = GEN_ORDER.indexOf(p.generation);
    pos[p.id] = {x:0, y:(gi<0?GEN_ORDER.length:gi)*(NH+VG)+20};
  });

  let xCur = 0;
  const visited = new Set();

  function assignX(id) {
    if (visited.has(id)) return;
    visited.add(id);
    const ch = kids[id]||[];
    if (ch.length === 0) {
      pos[id].x = xCur++*(NW+HG);
    } else {
      ch.forEach(cid => assignX(cid));
      pos[id].x = (pos[ch[0]].x + pos[ch[ch.length-1]].x)/2;
    }
    const person = members.find(p=>p.id===id);
    if (person?.spouseId && !visited.has(person.spouseId)) {
      const sp = members.find(p=>p.id===person.spouseId);
      if (sp && (!sp.parentId || !idSet.has(sp.parentId))) assignX(person.spouseId);
    }
  }

  members.filter(p=>!p.parentId||!idSet.has(p.parentId)).forEach(r=>assignX(r.id));
  members.forEach(p => { if (!visited.has(p.id)) { pos[p.id].x = xCur++*(NW+HG); } });
  return pos;
}

// ── SVG Tree ──────────────────────────────────────────────────────────────────
function initials(name) { return (name||'?').split(' ').map(n=>n[0]??'').join('').toUpperCase().slice(0,2); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function syncDownloadBtns(show) {
  ['pngBtn','svgBtn','pngBtn2','svgBtn2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('hidden', !show);
  });
}

function renderTree() {
  const f = fam();
  const container = document.getElementById('treeContainer');
  syncDownloadBtns(f.length > 0);
  if (!f.length) { container.innerHTML='<div class="empty">Add members to see the tree.</div>'; return; }

  const matchIds = query ? new Set(f.filter(p=>p.name.toLowerCase().includes(query)).map(p=>p.id)) : null;
  const pos = computeLayout(f);
  const dark = document.documentElement.dataset.theme === 'dark';
  const nFill  = dark ? '#1e1e1e' : '#fff';
  const nText  = dark ? '#e0e0e0' : '#1a1a1a';
  const nMuted = dark ? '#777'    : '#999';
  const bgFill = dark ? '#121212' : '#fff';
  const gridC  = dark ? '#1e1e1e' : '#f3f3f3';
  const shCol  = dark ? 'rgba(0,0,0,.4)' : 'rgba(0,0,0,.05)';

  const xs = Object.values(pos).map(p=>p.x);
  const ys = Object.values(pos).map(p=>p.y);
  const pad = 30;
  const W = Math.max(Math.max(...xs)+NW+pad, 500);
  const H = Math.max(Math.max(...ys)+NH+pad, 300);

  let edges='', nodes='';
  const drawnSp = new Set();

  f.forEach(p => {
    const px = pos[p.id];
    if (p.parentId && pos[p.parentId]) {
      const pp = pos[p.parentId];
      const x1=pp.x+NW/2, y1=pp.y+NH, x2=px.x+NW/2, y2=px.y, my=(y1+y2)/2;
      const dim = matchIds && !matchIds.has(p.id) && !matchIds.has(p.parentId);
      edges += `<path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}" fill="none" stroke="#aaa" stroke-width="1.5" opacity="${dim?.1:.5}"/>`;
    }
    if (p.spouseId && pos[p.spouseId]) {
      const key = [p.id,p.spouseId].sort().join('-');
      if (!drawnSp.has(key)) {
        drawnSp.add(key);
        const sp = pos[p.spouseId];
        const [lp,rp] = px.x<sp.x ? [px,sp] : [sp,px];
        const x1=lp.x+NW, y1=lp.y+NH/2, x2=rp.x, y2=rp.y+NH/2;
        const dim = matchIds && !matchIds.has(p.id) && !matchIds.has(p.spouseId);
        edges += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#e879a0" stroke-width="1.5" stroke-dasharray="5,3" opacity="${dim?.1:.7}"/>`;
        edges += `<text x="${(x1+x2)/2}" y="${(y1+y2)/2+4}" text-anchor="middle" font-size="11" fill="#e879a0" opacity="${dim?.1:.85}">&#x2665;</text>`;
      }
    }
  });

  f.forEach(p => {
    const {x,y} = pos[p.id];
    const color = GEN_COLOR[p.generation]??'#0066cc';
    const isSel = p.id===selectedId;
    const isDim = matchIds && !matchIds.has(p.id);
    const label = p.name.length>17 ? p.name.slice(0,16)+'…' : p.name;
    const dateStr = [p.birth??'', p.death?'†'+p.death:''].filter(Boolean).join(' ');
    const deceased = !!p.death;

    nodes += `<g onclick="nodeClick(${p.id})" style="cursor:pointer" opacity="${isDim?.2:1}">`;
    nodes += `<rect x="${x+2}" y="${y+2}" width="${NW}" height="${NH}" rx="8" fill="${shCol}"/>`;
    nodes += `<rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="8" fill="${deceased?(dark?'#1a1a1a':'#f9f9f9'):nFill}" stroke="${isSel?color:(dark?'#333':'#e0e0e0')}" stroke-width="${isSel?2.5:1}"/>`;
    nodes += `<rect x="${x}" y="${y}" width="${NW}" height="4" rx="2" fill="${color}"/>`;
    nodes += `<rect x="${x}" y="${y+2}" width="${NW}" height="2" fill="${color}"/>`;
    if (p.photo) {
      const cid=`cp${p.id}`;
      nodes += `<defs><clipPath id="${cid}"><circle cx="${x+24}" cy="${y+36}" r="19"/></clipPath></defs>`;
      nodes += `<image x="${x+5}" y="${y+17}" width="38" height="38" href="${p.photo}" clip-path="url(#${cid})" preserveAspectRatio="xMidYMid slice"/>`;
    } else {
      nodes += `<circle cx="${x+24}" cy="${y+36}" r="17" fill="${color}" opacity=".15"/>`;
      nodes += `<circle cx="${x+24}" cy="${y+36}" r="15" fill="${color}"/>`;
      nodes += `<text x="${x+24}" y="${y+41}" font-size="11" font-weight="700" text-anchor="middle" fill="white">${esc(initials(p.name))}</text>`;
    }
    if (deceased) nodes += `<text x="${x+11}" y="${y+17}" font-size="9" fill="${nMuted}" text-anchor="middle">&#x2020;</text>`;
    nodes += `<text x="${x+49}" y="${y+30}" font-size="10.5" font-weight="600" fill="${nText}">${esc(label)}</text>`;
    if (dateStr) nodes += `<text x="${x+49}" y="${y+44}" font-size="9" fill="${nMuted}">${esc(dateStr)}</text>`;
    nodes += `<text x="${x+49}" y="${y+58}" font-size="8" fill="${color}" font-weight="500">${esc(p.generation)}</text>`;
    nodes += '</g>';
  });

  container.innerHTML = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"
    font-family="system-ui,-apple-system,sans-serif"
    style="border:1px solid var(--border);border-radius:8px;display:block;background:${bgFill}">
    <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="${gridC}" stroke-width=".5"/>
    </pattern></defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
    ${edges}${nodes}
  </svg>`;
}

function nodeClick(id) {
  selectPerson(id);
  // On mobile show detail; on desktop always show detail
  viewDetail(id);
}

// ── Members List ──────────────────────────────────────────────────────────────
function renderMembers() {
  const f = fam(), list = document.getElementById('membersList'), empty = document.getElementById('emptyMsg');
  list.innerHTML = '';
  if (!f.length) { empty.style.display='block'; return; }
  empty.style.display = 'none';
  const filtered = query ? f.filter(p=>p.name.toLowerCase().includes(query)) : f;
  const grouped = {};
  GEN_ORDER.forEach(g=>{grouped[g]=[];});
  filtered.forEach(p=>{(grouped[p.generation]??=[]).push(p);});
  GEN_ORDER.forEach(gen => {
    const people = grouped[gen]??[]; if (!people.length) return;
    const hdr = document.createElement('div'); hdr.className='sh'; hdr.textContent=gen+'s'; list.appendChild(hdr);
    people.forEach(p => {
      const item = document.createElement('div');
      item.className = 'pi'+(p.id===selectedId?' sel':'');
      item.onclick = ()=>selectPerson(p.id);
      const dateStr = [p.birth??'', p.death?'†'+p.death:''].filter(Boolean).join('  ');
      const av = p.photo
        ? `<img src="${p.photo}" class="av" style="border-radius:50%;object-fit:cover">`
        : `<div class="av">${initials(p.name)}</div>`;
      item.innerHTML = `${av}<div><div class="pn">${p.name}</div><div class="ps">${dateStr||gen}</div></div>`;
      list.appendChild(item);
    });
  });
  if (!filtered.length && query) {
    const d=document.createElement('div'); d.className='empty'; d.textContent=`No results for "${query}"`; list.appendChild(d);
  }
}

function renderAll() { renderTreeSel(); renderMembers(); renderTree(); }

// ── Detail Modal ──────────────────────────────────────────────────────────────
function viewDetail(id) {
  const f = fam(), p = f.find(x=>x.id===id); if (!p) return;
  const parent   = f.find(x=>x.id===p.parentId);
  const spouse   = f.find(x=>x.id===p.spouseId);
  const children = f.filter(x=>x.parentId===id);
  const siblings = parent ? f.filter(x=>x.parentId===parent.id&&x.id!==id) : [];
  const age = p.birth ? (p.death??new Date().getFullYear())-p.birth : null;

  const av = p.photo
    ? `<img src="${p.photo}" class="mav" style="border-radius:50%;object-fit:cover">`
    : `<div class="mav">${initials(p.name)}</div>`;

  let facts='';
  if (p.birth)    facts+=`<div class="mfi"><div class="mfl">Born</div><div class="mfv">${p.birth}</div></div>`;
  if (p.death)    facts+=`<div class="mfi"><div class="mfl">Died</div><div class="mfv">${p.death}</div></div>`;
  if (age!==null) facts+=`<div class="mfi"><div class="mfl">${p.death?'Age at Death':'Age'}</div><div class="mfv">${age}</div></div>`;
  facts+=`<div class="mfi"><div class="mfl">Generation</div><div class="mfv">${p.generation}</div></div>`;

  let rels='';
  if (parent)          rels+=`<div class="mrel"><span class="mrel-l">Parent</span><span class="mrel-r">${esc(parent.name)}</span></div>`;
  if (spouse)          rels+=`<div class="mrel"><span class="mrel-l">&#x2665; Spouse</span><span class="mrel-r">${esc(spouse.name)}</span></div>`;
  if (children.length) rels+=`<div class="mrel"><span class="mrel-l">Children (${children.length})</span><span class="mrel-r">${children.map(c=>esc(c.name)).join(', ')}</span></div>`;
  if (siblings.length) rels+=`<div class="mrel"><span class="mrel-l">Siblings (${siblings.length})</span><span class="mrel-r">${siblings.map(s=>esc(s.name)).join(', ')}</span></div>`;

  document.getElementById('detailBody').innerHTML = `
    ${av}
    <div class="mn">${esc(p.name)}</div>
    <div class="mg">${esc(p.generation)}${p.death?' · Deceased':''}</div>
    <div class="mf">${facts}</div>
    ${p.notes?`<div class="mnotes">${esc(p.notes)}</div>`:''}
    ${rels?`<div class="mrels">${rels}</div>`:''}
    <button class="primary" style="width:100%;margin-top:13px" onclick="closeDetail();selectPerson(${id})">✏️ Edit</button>
  `;
  document.getElementById('detailBg').classList.add('open');
}
function closeDetail() { document.getElementById('detailBg').classList.remove('open'); }
function bgClick(e) { if (e.target===document.getElementById('detailBg')) closeDetail(); }

// ── Downloads ─────────────────────────────────────────────────────────────────
function getSVG() { return document.querySelector('#treeContainer svg'); }
function dlFile(href,name) { const a=document.createElement('a'); a.href=href; a.download=name; a.click(); }

function dlSVG() {
  const svg=getSVG(); if(!svg) return;
  dlFile(URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(svg)],{type:'image/svg+xml'})),'family-tree.svg');
}
function dlPNG() {
  const svg=getSVG(); if(!svg) return;
  const vb=svg.viewBox.baseVal, W=vb.width, H=vb.height;
  const url=URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(svg)],{type:'image/svg+xml'}));
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas'); c.width=W*2; c.height=H*2;
    const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height);
    ctx.scale(2,2); ctx.drawImage(img,0,0,W,H); URL.revokeObjectURL(url);
    dlFile(c.toDataURL('image/png'),'family-tree.png');
  };
  img.src=url;
}

// ── Keyboard Shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const mod = e.ctrlKey||e.metaKey;
  if (mod && e.key==='z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if (mod && (e.key==='y'||(e.key==='z'&&e.shiftKey))) { e.preventDefault(); redo(); }
  if (e.key==='Escape') { closeDetail(); closeMoreMenu(); closeMobileSearch(); }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
hist = [JSON.stringify(fam())];
histIdx = 0;
syncHistBtns();
renderTreeSel();
renderAll();
// Initialise mobile tab state
switchTab('tree');
