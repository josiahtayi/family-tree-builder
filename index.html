<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><h1>Family Tree</h1><p id="stats"></p></div>
    <div id="authSignIn" class="auth-row"><button type="button" class="btn btn-full" id="authSignInBtn">Sign in to edit</button></div>
    <div id="authUser" class="auth-row" hidden><span class="auth-email" id="authEmail"></span><button type="button" class="btn-link" id="authSignOut">Sign out</button></div>
    <div class="row"><button type="button" class="btn primary btn-full" id="addBtn">+ Add member</button></div>
    <div class="search-wrap"><input id="search" placeholder="Search names…"><button type="button" class="search-clear" id="searchClear" hidden>✕</button></div>
    <div class="row gap">
      <button type="button" class="btn grow" id="exportBtn">Download</button>
      <div id="importWrap" class="grow" hidden>
        <button type="button" class="btn btn-full" id="importBtn">Load data</button>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
    </div>
    <div class="row"><button type="button" class="btn btn-full" id="backupBtn">Backup photos</button></div>
    <div id="restoreWrap" class="row" hidden>
      <button type="button" class="btn btn-full" id="restoreBtn">Restore photos</button>
      <input type="file" id="restoreFile" accept="application/json" hidden>
    </div>
    <div class="editor" id="editor" hidden>
      <div class="editor-handle"></div>
      <div class="editor-header">
        <h2 id="editor-header-label">Edit member</h2>
        <button class="icon-btn" id="closeEditor" title="Close (Esc)">✕</button>
      </div>
      <div class="photo">
        <div id="ePhotoDrag" class="photo-drag" hidden>
          <img id="ePhoto" alt="">
        </div>
        <div id="ePhotoFallback" class="avatar lg"></div>
        <p class="photo-drag-hint" hidden>Drag to reposition</p>
        <label class="btn primary file" style="width:100%">Upload photo<input type="file" id="ePhotoInput" accept="image/*" hidden></label>
        <button class="btn danger" id="ePhotoRemove" style="width:100%" hidden>Remove photo</button>
      </div>
      <label class="lbl">Name</label>
      <input id="eName">
      <label class="lbl">Spouse / partner</label>
      <input id="eSpouse" placeholder="(optional)">
      <div class="photo" id="eSpousePhotoWrap" hidden>
        <div id="eSpousePhotoDrag" class="photo-drag" hidden>
          <img id="eSpousePhoto" alt="">
        </div>
        <div id="eSpousePhotoFallback" class="avatar lg"></div>
        <p class="photo-drag-hint" hidden>Drag to reposition</p>
        <label class="btn primary file btn-full">Upload spouse photo<input type="file" id="eSpousePhotoInput" accept="image/*" hidden></label>
        <button type="button" class="btn danger btn-full" id="eSpousePhotoRemove" hidden>Remove spouse photo</button>
      </div>
      <label class="lbl">Parent</label>
      <select id="eParent"></select>
      <div class="checks"><label><input type="checkbox" id="eDeceased"> Deceased</label><label><input type="checkbox" id="eSpouseDeceased"> Spouse deceased</label></div>
      <div class="row gap"><button type="button" class="btn primary grow" id="saveBtn">Save</button><button type="button" class="btn danger" id="deleteBtn">Delete</button></div>
      <div id="saveStatus" class="save-status"></div>
      <p class="hint">Changes are saved automatically. Photos are compressed and synced across all devices.</p>
    </div>
  </aside>
  <main class="main">
    <div class="tree-toolbar">
      <button type="button" class="btn" id="expandBtn">Expand all</button>
      <button type="button" class="btn" id="collapseBtn">Collapse all</button>
      <button type="button" class="btn" id="printBtn">Print trees</button>
      <button type="button" class="btn" id="posterBtn">Full poster</button>
      <span class="tree-legend">† deceased · tap to edit · hover for + child</span>
    </div>
    <div class="tree" id="tree"></div>
  </main>
</div>
<div id="editorBackdrop" class="editor-backdrop"></div>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
