<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><h1>Family Tree</h1><p id="stats"></p></div>
    <div class="row"><button class="btn primary" id="addBtn" style="width:100%">+ Add member</button></div>
    <div class="row"><input id="search" placeholder="Search names…"></div>
    <div class="row gap"><button class="btn" id="expandBtn" style="flex:1">Expand all</button><button class="btn" id="collapseBtn" style="flex:1">Collapse all</button></div>
    <div class="row gap"><button class="btn" id="exportBtn" style="flex:1">Download data</button><button class="btn" id="importBtn" style="flex:1">Load data</button><input type="file" id="importFile" accept="application/json" hidden></div>
    <div class="editor" id="editor" hidden>
      <h2>Edit member</h2>
      <div class="photo">
        <img id="ePhoto" alt="" hidden>
        <div id="ePhotoFallback" class="avatar lg"></div>
        <label class="btn primary file" style="width:100%">Upload photo<input type="file" id="ePhotoInput" accept="image/*" hidden></label>
        <button class="btn danger" id="ePhotoRemove" style="width:100%" hidden>Remove photo</button>
      </div>
      <label class="lbl">Name</label>
      <input id="eName">
      <label class="lbl">Spouse / partner</label>
      <input id="eSpouse" placeholder="(optional)">
      <label class="lbl">Parent</label>
      <select id="eParent"></select>
      <div class="checks"><label><input type="checkbox" id="eDeceased"> Deceased</label><label><input type="checkbox" id="eSpouseDeceased"> Spouse deceased</label></div>
      <div class="row gap"><button class="btn primary grow" id="saveBtn">Save</button><button class="btn danger" id="deleteBtn">Delete</button></div>
      <p class="hint">Changes save to the shared database instantly — everyone with the link will see updates in real time. Photos are stored locally on your device only.</p>
    </div>
  </aside>
  <main class="main">
    <div class="tree" id="tree"></div>
    <div class="legend" style="font-size:11px;color:#9a9388;border-top:1px solid #ece6dc;padding-top:8px;margin-top:8px">† = deceased · click a person to edit · click ▸/▾ to expand or collapse</div>
  </main>
</div>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
